<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title or "Referral Content Agent" }}</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #f7f7f9; color: #1f2937; }
    .container { max-width: 1100px; margin: 0 auto; background: white; padding: 24px; border-radius: 12px; }
    .nav a { margin-right: 16px; }
    .message { padding: 10px; background: #eef6ff; border: 1px solid #bfdcff; border-radius: 8px; margin: 12px 0; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { border: 1px solid #e5e7eb; padding: 8px; vertical-align: top; }
    th { background: #f3f4f6; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    button { border: 1px solid #d1d5db; padding: 8px 12px; border-radius: 8px; cursor: pointer; background: white; }
    .ok { background: #e8fff1; }
    .danger { background: #ffecec; }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav">
      <a href="/">Главная</a>
      <a href="/web/pins">Импорт пинов</a>
      <a href="/web/drafts">Черновики</a>
    </div>
    <hr>
    {% if message %}
      <div class="message">{{ message }}</div>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
